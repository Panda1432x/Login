<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Animated Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
body{height:100vh;background:url('background.jpg') center/cover no-repeat fixed;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:none;color:white}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.cursor-ball{position:fixed;width:16px;height:16px;border-radius:50%;pointer-events:none;background:white;box-shadow:0 0 15px white,0 0 30px rgba(255,255,255,.6),0 0 60px rgba(255,255,255,.4);transform:translate(-50%,-50%);z-index:5}
.trail{position:fixed;width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.7);pointer-events:none;z-index:4}
.login-box{position:relative;z-index:2;width:360px;padding:40px 35px;background:rgba(255,255,255,0.08);backdrop-filter:blur(14px);border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,.5);text-align:center;transition:.35s;}
.login-box:hover{transform:translateY(-5px) scale(1.01);box-shadow:0 30px 70px rgba(0,0,0,.6);}
.login-box h2{margin-bottom:25px;}
.input{margin-bottom:18px;}
.input input{width:100%;padding:12px 15px;border:none;border-radius:25px;outline:none;background:rgba(255,255,255,.8);color:black;font-size:14px;transition:.25s;}
.input input:focus{background:white;transform:scale(1.04);box-shadow:0 0 18px rgba(255,255,255,.9);}
.options{display:flex;justify-content:space-between;font-size:13px;margin-bottom:20px;}
button{width:100%;padding:12px;border:none;border-radius:25px;background:white;font-weight:bold;cursor:pointer;transition:transform .25s,box-shadow .25s,opacity .4s;}
button:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 12px 25px rgba(0,0,0,.45);}
button:active{transform:scale(1);}
.register{margin-top:18px;font-size:14px;}
.fade{opacity:0.4;transform:scale(.97);}
</style>
</head>
<body>

<canvas id="snow"></canvas>
<div class="cursor-ball" id="cursor"></div>

<div class="login-box">
    <h2>Login</h2>
    <div class="input"><input type="text" placeholder="Username" id="username"></div>
    <div class="input"><input type="password" placeholder="Password" id="password"></div>
    <div class="options">
        <label><input type="checkbox"> Remember me</label>
        <a href="#" style="color:white">Forgot password?</a>
    </div>
    <button onclick="loginClick()">Login</button>
    <div class="register">Don't have an account? Register</div>
</div>

<script>
/* Cursor & Trail */
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    createTrail(e.clientX, e.clientY);
});
function createTrail(x,y){const t=document.createElement('div');t.className='trail';t.style.left=x+'px';t.style.top=y+'px';document.body.appendChild(t);setTimeout(()=>{t.style.transition='0.5s';t.style.opacity='0';t.style.transform='scale(.3)';},10);setTimeout(()=>{t.remove()},500);}
document.querySelectorAll('input,button').forEach(el=>{el.addEventListener('mouseenter',()=>{cursor.style.transform='translate(-50%,-50%) scale(2)';});el.addEventListener('mouseleave',()=>{cursor.style.transform='translate(-50%,-50%) scale(1)';});});
function fadeButton(btn){btn.classList.add("fade");setTimeout(()=>{btn.classList.remove("fade");},400);}

/* --- Login via backend --- */
async function loginClick(){
    const btn=document.querySelector('button');
    const username=document.getElementById('username').value.trim();
    const password=document.getElementById('password').value.trim();
    if(!username||!password){alert('Please enter username and password!');return;}
    fadeButton(btn);

    try{
        const res=await fetch('/login', {  // backend endpoint
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({username,password})
        });
        const data=await res.json();
        if(data.success){
            alert('✅ Login Successful!');
            // TODO: redirect to dashboard
        } else {
            alert('❌ Invalid username or password!');
        }
    } catch(err){
        console.error(err);
        alert('Error connecting to server.');
    }
}

/* Snowfall */
const canvas=document.getElementById('snow');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
let snow=[]; for(let i=0;i<180;i++){snow.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*3+1,s:Math.random()*1+0.6});}
let mouse={x:0,y:0}; document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
function drawSnow(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='white';ctx.beginPath();snow.forEach(p=>{ctx.moveTo(p.x,p.y);ctx.arc(p.x,p.y,p.r,0,Math.PI*2);});ctx.fill();snow.forEach(p=>{let dx=p.x-mouse.x,dy=p.y-mouse.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<80){p.x+=dx/8;p.y+=dy/8;}p.y+=p.s;if(p.y>canvas.height){p.y=0;p.x=Math.random()*canvas.width;}});requestAnimationFrame(drawSnow);}
drawSnow();
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
</script>
</body>
</html>
